name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let the latest win
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Build with the correct base path for a project page:
      # https://<user>.github.io/<repo>/  ->  base = /<repo>/
      - name: Build
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/

      # Add a 404 fallback so deep links resolve to the SPA (HashRouter-safe)
      - name: SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
